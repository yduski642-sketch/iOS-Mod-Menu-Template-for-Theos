name: Build Mod Menu
on: [workflow_dispatch]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git ~/theos
          # ل ڤێرێ من لینکێ SDK ڕاست کر دا تووشی وێ شاشییێ نەبی
          curl -LO https://github.com/theos/sdks/raw/master/iPhoneOS14.5.sdk.tar.xz
          mkdir -p ~/theos/sdks
          tar -xf iPhoneOS14.5.sdk.tar.xz -C ~/theos/sdks/
          echo "THEOS=~/theos" >> $GITHUB_ENV

      - name: Build
        run: |
          export THEOS=~/theos
          # ئەگەر Makefile د ناڤ فۆڵدەرێ template دایە، ئەڤە دێ کار کەت
          cd template && make package FINALPACKAGE=1
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: My-Mod-Menu
          path: template/packages/*.deb
